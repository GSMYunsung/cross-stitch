name: Daily CrossStitch Update

on:
  schedule:
    - cron: "0 0 * * *" # 매일 자정 UTC (한국시간 09:00)
  workflow_dispatch: # 수동 실행 허용

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cron endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "APP_URL or CRON_SECRET not configured — skipping (not deployed yet)"
            exit 0
          fi

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "$APP_URL/api/cron/update" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Content-Type: application/json")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Cron endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi
