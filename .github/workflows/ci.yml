name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Lint
        id: lint
        run: npm run lint 2>&1 | tee lint-output.txt
        continue-on-error: true

      - name: Type Check
        id: typecheck
        run: npm run typecheck 2>&1 | tee typecheck-output.txt
        continue-on-error: true

      - name: Test
        id: test
        run: npm run test 2>&1 | tee test-output.txt
        continue-on-error: true

      - name: Report & open PR on failure
        if: steps.lint.outcome == 'failure' || steps.typecheck.outcome == 'failure' || steps.test.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORT="## CI мӢӨнҢЁ лҰ¬нҸ¬нҠё\n\n"

          if [ "${{ steps.lint.outcome }}" == "failure" ]; then
            REPORT+="### вқҢ Lint\n\`\`\`\n$(cat lint-output.txt)\n\`\`\`\n"
            REPORT+="**нһҢнҠё**: \`npm run lint:fix\` лЎң мһҗлҸҷ мҲҳм •н•ҳкұ°лӮҳ м—җлҹ¬ мң„м№ҳлҘј м§Ғм ‘ мҲҳм •н•ҳм„ёмҡ”.\n\n"
          fi

          if [ "${{ steps.typecheck.outcome }}" == "failure" ]; then
            REPORT+="### вқҢ TypeCheck\n\`\`\`\n$(cat typecheck-output.txt)\n\`\`\`\n"
            REPORT+="**нһҢнҠё**: \`npm run typecheck\` лЎң лЎңм»¬м—җм„ң нҷ•мқё нӣ„ нғҖмһ… мҳӨлҘҳлҘј мҲҳм •н•ҳм„ёмҡ”.\n\n"
          fi

          if [ "${{ steps.test.outcome }}" == "failure" ]; then
            REPORT+="### вқҢ Test\n\`\`\`\n$(cat test-output.txt)\n\`\`\`\n"
            REPORT+="**нһҢнҠё**: \`npm run test\` лЎң мӢӨнҢЁн•ң н…ҢмҠӨнҠёлҘј нҷ•мқён•ҳкі  лЎңм§Ғ лҳҗлҠ” н…ҢмҠӨнҠё мјҖмқҙмҠӨлҘј мҲҳм •н•ҳм„ёмҡ”.\n\n"
          fi

          if [ "${{ github.event_name }}" == "pull_request" ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body "$(echo -e "$REPORT")"
          else
            BRANCH="fix/ci-${{ github.run_id }}"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b $BRANCH
            git push origin $BRANCH
            gh pr create \
              --title "fix: CI мӢӨнҢЁ вҖ” $(echo '${{ github.sha }}' | cut -c1-7)" \
              --body "$(echo -e "$REPORT")" \
              --base main \
              --head $BRANCH
          fi

      - name: Fail CI
        if: steps.lint.outcome == 'failure' || steps.typecheck.outcome == 'failure' || steps.test.outcome == 'failure'
        run: exit 1
