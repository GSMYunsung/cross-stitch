name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Auto-open PR
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --head "${{ github.ref_name }}" --base main --json number --jq '.[0].number')
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --title "${{ github.ref_name }}" \
              --body "자동 생성된 PR입니다." \
              --base main \
              --head "${{ github.ref_name }}"
          fi

      - name: Lint
        id: lint
        run: npm run lint 2>&1 | tee lint-output.txt
        continue-on-error: true

      - name: Type Check
        id: typecheck
        run: npm run typecheck 2>&1 | tee typecheck-output.txt
        continue-on-error: true

      - name: Test
        id: test
        run: npm run test 2>&1 | tee test-output.txt
        continue-on-error: true

      - name: Comment on PR if failure
        if: (steps.lint.outcome == 'failure' || steps.typecheck.outcome == 'failure' || steps.test.outcome == 'failure')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORT="## CI 실패 리포트\n\n"

          if [ "${{ steps.lint.outcome }}" == "failure" ]; then
            REPORT+="### ❌ Lint\n\`\`\`\n$(cat lint-output.txt)\n\`\`\`\n"
            REPORT+="**힌트**: \`npm run lint:fix\` 로 자동 수정하거나 에러 위치를 직접 수정하세요.\n\n"
          fi

          if [ "${{ steps.typecheck.outcome }}" == "failure" ]; then
            REPORT+="### ❌ TypeCheck\n\`\`\`\n$(cat typecheck-output.txt)\n\`\`\`\n"
            REPORT+="**힌트**: \`npm run typecheck\` 로 로컬에서 확인 후 타입 오류를 수정하세요.\n\n"
          fi

          if [ "${{ steps.test.outcome }}" == "failure" ]; then
            REPORT+="### ❌ Test\n\`\`\`\n$(cat test-output.txt)\n\`\`\`\n"
            REPORT+="**힌트**: \`npm run test\` 로 실패한 테스트를 확인하고 로직 또는 테스트 케이스를 수정하세요.\n\n"
          fi

          PR_NUMBER=$(gh pr list --head "${{ github.ref_name }}" --base main --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            gh pr comment "$PR_NUMBER" --body "$(echo -e "$REPORT")"
          fi

      - name: Fail CI
        if: steps.lint.outcome == 'failure' || steps.typecheck.outcome == 'failure' || steps.test.outcome == 'failure'
        run: exit 1
