<svg xmlns="http://www.w3.org/2000/svg"
     width="1024"
     height="1024"
     viewBox="0 0 32 32"
     shape-rendering="crispEdges">

    <!-- Background -->
    <rect width="32" height="32" rx="6" fill="#F6F2E8"/>

    <!-- Strawberry (centered & larger) -->
    <g transform="translate(16 16) scale(1.3) translate(-8 -8)">

        <!-- Leaves -->
        <rect x="7" y="0" width="2" height="1" fill="#5DAA4C"/>
        <rect x="5" y="1" width="6" height="1" fill="#5DAA4C"/>
        <rect x="4" y="2" width="8" height="1" fill="#5DAA4C"/>
        <rect x="5" y="3" width="6" height="1" fill="#5DAA4C"/>

        <!-- Body -->
        <rect x="5" y="4" width="6" height="1" fill="#E63946"/>
        <rect x="3" y="5" width="10" height="1" fill="#E63946"/>
        <rect x="2" y="6" width="12" height="2" fill="#E63946"/>
        <rect x="1" y="8" width="14" height="2" fill="#E63946"/>
        <rect x="2" y="10" width="12" height="2" fill="#E63946"/>
        <rect x="3" y="12" width="10" height="2" fill="#E63946"/>
        <rect x="4" y="14" width="8" height="1" fill="#E63946"/>
        <rect x="5" y="15" width="6" height="1" fill="#E63946"/>

        <!-- Seeds -->
        <rect x="5" y="6" width="1" height="1" fill="#FFE59A"/>
        <rect x="9" y="6" width="1" height="1" fill="#FFE59A"/>
        <rect x="7" y="8" width="1" height="1" fill="#FFE59A"/>
        <rect x="5" y="10" width="1" height="1" fill="#FFE59A"/>
        <rect x="9" y="10" width="1" height="1" fill="#FFE59A"/>
        <rect x="7" y="12" width="1" height="1" fill="#FFE59A"/>

    </g>

</svg>